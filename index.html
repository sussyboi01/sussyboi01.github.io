<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>qz-star</title>
<style>
  :root {
    --bg: #0d0b1a;
    --surface: #13101f;
    --surface2: #1c1830;
    --neon: #7c3aff;
    --neon2: #a855f7;
    --border: rgba(124, 58, 255, 0.3);
    --text: #e2d9f3;
    --muted: #6b5f88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Background glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 0%, rgba(124,58,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 100%, rgba(168,85,247,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ---- TAB BAR ---- */
  #tabBar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 6px;
    height: 40px;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #tabBar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    max-width: 160px;
    min-width: 80px;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    transition: background 0.15s, color 0.15s;
    user-select: none;
    flex-shrink: 0;
  }

  .tab.active {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border);
  }

  .tab-favicon {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tab-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    padding: 0 2px;
    border-radius: 3px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { color: #f87171; }

  #newTabBtn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  #newTabBtn:hover { color: var(--neon2); background: rgba(124,58,255,0.1); }

  /* ---- ADDRESS BAR ---- */
  #navBar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 10px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 5px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }
  .nav-btn:hover:not(:disabled) { color: var(--neon2); background: rgba(124,58,255,0.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  #addressBar {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #addressBar:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 2px rgba(124,58,255,0.2);
  }
  #addressBar::placeholder { color: var(--muted); }

  /* ---- CONTENT ---- */
  #content {
    flex: 1;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  #content iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ---- NEW TAB PAGE ---- */
  #newTabPage {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }

  .nt-logo {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nt-search {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 500px;
  }

  .nt-search input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .nt-search input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 2px rgba(124,58,255,0.2);
  }
  .nt-search input::placeholder { color: var(--muted); }

  .nt-go {
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    box-shadow: 0 0 16px rgba(124,58,255,0.4);
  }
  .nt-go:hover { opacity: 0.85; }

  .nt-quick {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 500px;
  }

  .quick-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.2s;
    min-width: 72px;
    text-decoration: none;
  }
  .quick-link:hover {
    border-color: var(--neon);
    color: var(--neon2);
    background: rgba(124,58,255,0.08);
  }
  .quick-link .ql-icon { font-size: 1.5rem; }

  /* ---- LOADING OVERLAY ---- */
  #loadingBar {
    position: absolute;
    top: 0;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon), var(--neon2), #06b6d4);
    width: 0%;
    transition: width 0.3s;
    z-index: 20;
    box-shadow: 0 0 8px rgba(124,58,255,0.6);
    display: none;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
</style>
</head>
<body>

<div id="tabBar">
  <!-- tabs rendered here -->
  <button id="newTabBtn" title="New tab">+</button>
</div>

<div id="navBar">
  <button class="nav-btn" id="backBtn" title="Back" disabled>&#8592;</button>
  <button class="nav-btn" id="fwdBtn" title="Forward" disabled>&#8594;</button>
  <button class="nav-btn" id="reloadBtn" title="Reload">&#8635;</button>
  <input type="text" id="addressBar" placeholder="Search or enter address..." spellcheck="false" />
  <button class="nav-btn" id="homeBtn" title="New tab">⌂</button>
</div>

<div id="content">
  <div id="loadingBar"></div>
  <div id="newTabPage"></div>
</div>

<script>
// ---- STATE ----
let tabs = [];
let activeId = null;

// ---- UTILS ----
function urlify(input) {
  input = input.trim();
  if (!input) return null;
  if (input.startsWith('http://') || input.startsWith('https://')) return input;
  // looks like a domain
  if (/^[\w-]+\.[a-z]{2,}(\/|$)/i.test(input)) return 'https://' + input;
  // search query
  return 'https://search.brave.com/search?q=' + encodeURIComponent(input);
}

function hostnameOrTitle(url) {
  if (!url || url === 'newtab') return 'New Tab';
  try { return new URL(url).hostname.replace('www.', ''); } catch { return 'Tab'; }
}

function faviconFor(url) {
  if (!url || url === 'newtab') return null;
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?sz=32&domain=${u.hostname}`;
  } catch { return null; }
}

function proxyUrl(url) {
  if (!url || url === 'newtab') return null;
  const cfg = window.__uv$config;
  if (!cfg) return null;
  return cfg.prefix + cfg.encodeUrl(url);
}

// ---- TAB MANAGEMENT ----
function createTab(url = 'newtab', activate = true) {
  const id = Date.now() + '-' + Math.random();
  const tab = { id, url, title: hostnameOrTitle(url) };
  tabs.push(tab);
  renderTabBar();
  if (activate) setActive(id);
  return id;
}

function closeTab(id, e) {
  if (e) e.stopPropagation();
  const idx = tabs.findIndex(t => t.id === id);
  tabs = tabs.filter(t => t.id !== id);
  if (activeId === id) {
    const next = tabs[Math.min(idx, tabs.length - 1)];
    if (next) setActive(next.id);
    else createTab();
  } else {
    renderTabBar();
  }
}

function setActive(id) {
  activeId = id;
  renderTabBar();
  const tab = tabs.find(t => t.id === id);
  if (tab) loadTab(tab);
}

function renderTabBar() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id === activeId ? ' active' : '');
    el.onclick = () => setActive(t.id);
    const fav = faviconFor(t.url);
    el.innerHTML = `
      ${fav ? `<img class="tab-favicon" src="${fav}" onerror="this.style.display='none'" />` : ''}
      <span class="tab-title">${t.title}</span>
      <button class="tab-close" title="Close tab">×</button>
    `;
    el.querySelector('.tab-close').onclick = (e) => closeTab(t.id, e);
    bar.appendChild(el);
  });
  const plus = document.createElement('button');
  plus.id = 'newTabBtn';
  plus.textContent = '+';
  plus.title = 'New tab';
  plus.onclick = () => createTab();
  bar.appendChild(plus);
}

function loadTab(tab) {
  const content = document.getElementById('content');
  const addr = document.getElementById('addressBar');
  addr.value = tab.url === 'newtab' ? '' : tab.url;

  content.innerHTML = '<div id="loadingBar" style="display:none"></div>';

  if (tab.url === 'newtab') {
    renderNewTabPage();
    return;
  }

  // show loading bar
  const bar = document.getElementById('loadingBar');
  bar.style.display = 'block';
  bar.style.width = '30%';
  setTimeout(() => { bar.style.width = '70%'; }, 200);

  const pUrl = proxyUrl(tab.url);
  if (!pUrl) {
    // UV config not ready yet, use embed fallback
    const iframe = document.createElement('iframe');
    iframe.src = `/s/embed.html#${tab.url}`;
    iframe.onload = () => {
      bar.style.width = '100%';
      setTimeout(() => { bar.style.display = 'none'; }, 400);
    };
    content.appendChild(iframe);
    return;
  }

  const iframe = document.createElement('iframe');
  iframe.src = `/s/embed.html#${tab.url}`;
  iframe.onload = () => {
    bar.style.width = '100%';
    setTimeout(() => { bar.style.display = 'none'; }, 400);
    // try to update title
    try {
      const t = tabs.find(t => t.id === activeId);
      if (t) {
        t.title = hostnameOrTitle(tab.url);
        renderTabBar();
      }
    } catch {}
  };
  content.appendChild(iframe);
}

// ---- NEW TAB PAGE ----
function renderNewTabPage() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div id="newTabPage">
      <div class="nt-logo">qz-star</div>
      <div class="nt-search">
        <input type="text" id="ntInput" placeholder="Search or enter URL..." autofocus />
        <button class="nt-go" onclick="ntGo()">Go</button>
      </div>
      <div class="nt-quick">
        <a class="quick-link" onclick="navigateTo('https://youtube.com')">
          <span class="ql-icon">▶</span>YouTube
        </a>
        <a class="quick-link" onclick="navigateTo('https://google.com')">
          <span class="ql-icon">🔍</span>Google
        </a>
        <a class="quick-link" onclick="navigateTo('https://wikipedia.org')">
          <span class="ql-icon">📖</span>Wikipedia
        </a>
        <a class="quick-link" onclick="navigateTo('https://reddit.com')">
          <span class="ql-icon">💬</span>Reddit
        </a>
        <a class="quick-link" onclick="navigateTo('https://github.com')">
          <span class="ql-icon">🐙</span>GitHub
        </a>
        <a class="quick-link" onclick="navigateTo('https://twitch.tv')">
          <span class="ql-icon">🟣</span>Twitch
        </a>
      </div>
    </div>
  `;
  document.getElementById('ntInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') ntGo();
  });
  document.getElementById('addressBar').value = '';
}

function ntGo() {
  const input = document.getElementById('ntInput')?.value;
  if (input) navigateTo(urlify(input));
}

// ---- NAVIGATION ----
function navigateTo(url) {
  if (!url) return;
  const tab = tabs.find(t => t.id === activeId);
  if (tab) {
    tab.url = url;
    tab.title = hostnameOrTitle(url);
    loadTab(tab);
    renderTabBar();
  }
}

document.getElementById('addressBar').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const url = urlify(e.target.value);
    if (url) navigateTo(url);
  }
});

document.getElementById('homeBtn').onclick = () => {
  const tab = tabs.find(t => t.id === activeId);
  if (tab) { tab.url = 'newtab'; tab.title = 'New Tab'; loadTab(tab); renderTabBar(); }
};

document.getElementById('reloadBtn').onclick = () => {
  const tab = tabs.find(t => t.id === activeId);
  if (tab && tab.url !== 'newtab') loadTab(tab);
};

// ---- KEYBOARD SHORTCUTS ----
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); createTab(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); if (activeId) closeTab(activeId); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); document.getElementById('addressBar').select(); }
});

// ---- INIT ----
createTab('newtab', true);
</script>

</body>
</html>
